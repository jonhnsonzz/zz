<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>高新认定自检工具</title>
<style>
body{font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f0f2f5;color:#333}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
h1{text-align:center;font-size:24px;margin:0 0 4px 0;color:#1a1a2e}
.sub{text-align:center;color:#888;font-size:14px;margin-bottom:20px}
.q{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #eee}
.q:last-child{border:none;margin-bottom:0;padding-bottom:0}
.q label{display:block;font-weight:600;font-size:14px;margin-bottom:6px;color:#444}
.q select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fafafa}
.q select:focus{outline:none;border-color:#4361ee}
.btn{display:block;width:100%;padding:12px;background:#4361ee;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;text-align:center}
.btn:hover{background:#3651d4}
.btn.green{background:#2ec4b6}
.btn.green:hover{background:#28a89d}
.hide{display:none}
.result{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.score{text-align:center;padding:16px 0}
.score-num{font-size:48px;font-weight:700}
.score-num.green{color:#2ec4b6}
.score-num.orange{color:#ff9f1c}
.score-num.red{color:#e71d36}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;color:#fff;font-size:13px;font-weight:600;margin:6px 0}
.tag.green{background:#2ec4b6}
.tag.orange{background:#ff9f1c}
.tag.red{background:#e71d36}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.row:last-child{border:none}
.suggest{background:#f8f9ff;border-radius:8px;padding:14px;margin-top:16px;font-size:13px;color:#333;line-height:1.8}
.suggest strong{color:#4361ee}
.footer{text-align:center;color:#aaa;font-size:12px;margin-top:32px;line-height:1.8}
</style>
</head>
<body>
<div class="card" id="quizCard">
<h1>🏢 高新认定自检</h1>
<p class="sub">6个问题 · 3分钟出结果</p>
<div id="questions"></div>
<button class="btn" onclick="calc()">开始评估</button>
</div>
<div id="resultCard" class="hide result"></div>
<div class="footer">仅供初步自查参考 · 正式申报以官方为准</div>
<script>
const d=[{q:'企业注册成立时间？',o:['不满1年','1年以上','3年以上'],s:[0,5,10]},{q:'Ⅰ类知识产权数量（发明专利等）？',o:['0项','1项','2项以上'],s:[0,10,15]},{q:'科技人员占职工总数比例？',o:['低于10%','10%~30%','30%以上'],s:[0,10,15]},{q:'近3年研发费用比例达标吗？',o:['不达标','基本达标','完全达标'],s:[0,10,20]},{q:'高新收入占总收入比例？',o:['低于60%','60%~80%','80%以上'],s:[0,15,20]},{q:'创新能力评价预估多少分？',o:['低于70','70~80','80以上'],s:[0,10,20]}];
function init(){const c=document.getElementById('questions');c.innerHTML='';d.forEach((x,i)=>{c.innerHTML+='<div class="q"><label>'+(i+1)+'. '+x.q+'</label><select id="s'+i+'">'+x.o.map((t,j)=>'<option value="'+x.s[j]+'">'+t+'</option>').join('')+'</select></div>';});}
function calc(){let t=0;d.forEach((_,i)=>t+=+document.getElementById('s'+i).value);const r=document.getElementById('resultCard');r.classList.remove('hide');document.getElementById('quizCard').classList.add('hide');let p=t>=70,c,l,cl;if(t>=85){c='green';l='A';cl='#2ec4b6';}else if(t>=70){c='orange';l='B';cl='#ff9f1c';}else{c='red';l='C';cl='#e71d36';}
let rows='';d.forEach((x,i)=>{const v=+document.getElementById('s'+i).value;const m=Math.max(...x.s);const ic=v===0?'❌':v<m?'⚠️':'✅';rows+='<div class="row"><span>'+ic+' '+x.q+'</span><span style="font-weight:600;color:'+(v===0?'#e71d36':v<m?'#ff9f1c':'#2ec4b6')+'">'+v+'/'+m+'</span></div>';});
let sug='';if(t<70)sug='先补齐硬性条件（知识产权、科技人员比例），再准备申报材料。建议咨询专业机构做预审评估。';else if(t<85)sug='基本达到条件，建议针对低分项补强后再申报，提高通过率。';else sug='条件充分！可登录高新技术企业认定管理工作网提交申请。如需完整申报材料清单，可获取详细SOP报告。';
r.innerHTML='<div class="score"><div class="score-num '+c+'">'+t+'</div><div style="color:#888;font-size:14px">综合评分 / 100</div><span class="tag '+c+'">'+l+'级</span> '+(t>=70?'✅ 建议申报':'❌ 暂不建议')+'</div><div style="font-weight:600;margin:8px 0 4px">各维度详情：</div>'+rows+'<div class="suggest"><strong>下一步：</strong>'+sug+'</div><button class="btn green" style="margin-top:16px" onclick="reset()">重新评估</button>';r.scrollIntoView({behavior:'smooth'});}
function reset(){document.getElementById('resultCard').classList.add('hide');document.getElementById('quizCard').classList.remove('hide');d.forEach((_,i)=>document.getElementById('s'+i).selectedIndex=0);window.scrollTo({top:0,behavior:'smooth'})}
init();
</script>
</body>
</html>
